name: pediatrack
description: "Application for tracking pediatric records"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  intl: ^0.20.2
  uuid: ^4.3.3
  fl_chart: ^0.66.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/who/